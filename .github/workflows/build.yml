name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          flutter create --org com.webtoapp --project-name myapp --platforms android _tmp
          cp -r _tmp/android ./android
          cp _tmp/pubspec.yaml ./pubspec.yaml

      - name: Add webview dependency
        run: flutter pub add webview_flutter

      - name: Ensure INTERNET permission
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q "INTERNET" "$M" || sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>
    <application|' "$M"

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: myapp-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "ويميز v1.0.0"
          body: "APK for https://store-dz-10587.web.app/"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}